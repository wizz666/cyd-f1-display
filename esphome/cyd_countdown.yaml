# ── Display (ILI9341, 320x240 landscape) ─────────────────────────────────────
display:
  - platform: ili9xxx
    model: M5STACK
    cs_pin: GPIO15
    dc_pin: GPIO2
    color_palette: 8BIT
    invert_colors: false
    transform:
      mirror_x: true
    update_interval: 30s
    lambda: |-

      // Färghjälp: "red"/"yellow"/"green" → Color
      auto col = [](const std::string& c) -> Color {
        if (c == "green")  return Color(14, 90, 42);
        if (c == "yellow") return Color(250, 204, 21);
        return Color(239, 68, 68);
      };

      // Bakgrund
      it.fill(Color(13, 17, 23));

      // ── HEADER (y:0-32) ──────────────────────────────────────────────────

      it.image(2, 4, id(f1_logo));

      // Race + bana (centrerade mellan logo och höger info)
      it.print(155, 3,  id(font_xs), Color(255, 255, 255), TextAlign::TOP_CENTER, id(cyd_race_name).state.c_str());
      it.print(155, 17, id(font_xs), Color(100, 116, 139), TextAlign::TOP_CENTER, id(cyd_circuit).state.c_str());

      // Bantemp (höger, i linje med race name, vit)
      {
        std::string ct = id(cyd_circuit_temp).state;
        bool valid = !ct.empty() && ct != "\xe2\x80\x93";
        std::string ct_disp = valid ? (ct + "\xC2\xB0""C") : ct;
        it.print(315, 3, id(font_xs), Color(255, 255, 255), TextAlign::TOP_RIGHT, ct_disp.c_str());
      }

      // Circuit lokaltid (höger, i linje med circuit name, grå)
      it.print(315, 17, id(font_xs), Color(100, 116, 139), TextAlign::TOP_RIGHT, id(cyd_circuit_time).state.c_str());

      auto now = id(ha_time).now();

      // ── SEPARATORER ──────────────────────────────────────────────────────
      it.horizontal_line(0,   33,  320, Color(30, 41, 59));  // header
      it.vertical_line(159,   34,  173, Color(30, 41, 59));  // vertikal mittlinje (y:34-207)
      it.horizontal_line(161, 109, 159, Color(30, 41, 59));  // höger: mellan senaste race och standings
      it.horizontal_line(161, 207, 159, Color(30, 41, 59));  // höger: under förarmästerskapet

      // ── VÄNSTER: Live FÖRARE / SPRINT / KVAL / RACE ─────────────────────
      bool show_sprint = id(cyd_sprint_show).state == "1";
      int  circuit_y   = live ? 155 : (show_sprint ? 155 : 150);

      // Tyre-färg: första bokstaven i däcksträngen → Color
      auto tc = [](const std::string& t) -> Color {
        if (!t.empty()) {
          if (t[0] == 'S') return Color(239, 68,  68);   // Soft  – röd
          if (t[0] == 'M') return Color(250, 204, 21);   // Med   – gul
          if (t[0] == 'I') return Color(57,  211, 83);   // Inter – grön
          if (t[0] == 'W') return Color(100, 149, 237);  // Wet   – blå
        }
        return Color(255, 255, 255);  // Hard – vit
      };

      if (live) {
        // ── LIVE: Dina följda förare ──────────────────────────────────────
        it.print(5, 40, id(font_xs), Color(100, 116, 139), "DINA FÖRARE");

        // Hjälplambda: position → färg
        auto pc = [](int p) -> Color {
          return p == 1 ? Color(255, 215, 0) :
                 p == 2 ? Color(192, 192, 192) :
                 p == 3 ? Color(205, 127, 50) :
                          Color(255, 255, 255);
        };

        // Förare 1
        { int p = atoi(id(cyd_d1_pos).state.c_str());
          it.print(5,  54, id(font_xs), pc(p),                id(cyd_d1_pos).state.c_str());
          it.print(22, 54, id(font_xs), Color(255, 255, 255), id(cyd_d1_name).state.c_str());
          it.print(5,  68, id(font_xs), Color(100, 116, 139), id(cyd_d1_gap).state.c_str());
          it.print(90, 68, id(font_xs), tc(id(cyd_d1_tyre).state), id(cyd_d1_tyre).state.c_str()); }

        // Förare 2
        { int p = atoi(id(cyd_d2_pos).state.c_str());
          it.print(5,  86, id(font_xs), pc(p),                id(cyd_d2_pos).state.c_str());
          it.print(22, 86, id(font_xs), Color(255, 255, 255), id(cyd_d2_name).state.c_str());
          it.print(5,  100, id(font_xs), Color(100, 116, 139), id(cyd_d2_gap).state.c_str());
          it.print(90, 100, id(font_xs), tc(id(cyd_d2_tyre).state), id(cyd_d2_tyre).state.c_str()); }

        // Förare 3
        { int p = atoi(id(cyd_d3_pos).state.c_str());
          it.print(5,  118, id(font_xs), pc(p),                id(cyd_d3_pos).state.c_str());
          it.print(22, 118, id(font_xs), Color(255, 255, 255), id(cyd_d3_name).state.c_str());
          it.print(5,  132, id(font_xs), Color(100, 116, 139), id(cyd_d3_gap).state.c_str());
          it.print(90, 132, id(font_xs), tc(id(cyd_d3_tyre).state), id(cyd_d3_tyre).state.c_str()); }

      } else if (show_sprint) {
        // ── SPRINT-helg ───────────────────────────────────────────────────
        it.print(5,  38, id(font_xs), Color(100, 116, 139), id(cyd_sprint_date).state.c_str());
        it.print(5,  52, id(font_xs), Color(100, 116, 139), "SPRINT");
        it.print(52, 52, id(font_xs), Color(255, 255, 255), id(cyd_sprint_count).state.c_str());
        it.print(5,  72, id(font_xs), Color(100, 116, 139), id(cyd_qual_date).state.c_str());
        it.print(5,  86, id(font_xs), Color(100, 116, 139), "KVAL");
        it.print(38, 86, id(font_xs), Color(255, 255, 255), id(cyd_qual_count).state.c_str());
        it.print(5,  106, id(font_xs), Color(100, 116, 139), id(cyd_race_date).state.c_str());
        it.print(5,  120, id(font_xs), Color(100, 116, 139), "RACE");
        it.print(38, 120, id(font_xs), Color(255, 255, 255), id(cyd_race_count).state.c_str());

      } else {
        // ── Normal helg ───────────────────────────────────────────────────
        it.print(5,  38, id(font_xs), Color(100, 116, 139), id(cyd_qual_date).state.c_str());
        it.print(5,  52, id(font_xs), Color(100, 116, 139), "KVAL");
        it.print(38, 52, id(font_xs), Color(255, 255, 255), id(cyd_qual_count).state.c_str());
        it.print(5,  75, id(font_xs), Color(100, 116, 139), id(cyd_race_date).state.c_str());
        it.print(5,  89, id(font_xs), Color(100, 116, 139), "RACE");
        it.print(38, 89, id(font_xs), Color(255, 255, 255), id(cyd_race_count).state.c_str());
      }

      // ── Circuit-bild (alltid synlig, y beror på läge) ─────────────────
      {
        const std::string& sl = id(cyd_circuit_slug).state;
        if      (sl == "australia")            it.image(14, circuit_y, id(circuit_australia));
        else if (sl == "china")                it.image(14, circuit_y, id(circuit_china));
        else if (sl == "miami")                it.image(14, circuit_y, id(circuit_miami));
        else if (sl == "canada")               it.image(14, circuit_y, id(circuit_canada));
        else if (sl == "monaco")               it.image(14, circuit_y, id(circuit_monaco));
        else if (sl == "barcelona-catalunya")  it.image(14, circuit_y, id(circuit_barcelona_catalunya));
        else if (sl == "austria")              it.image(14, circuit_y, id(circuit_austria));
        else if (sl == "great-britain")        it.image(14, circuit_y, id(circuit_great_britain));
        else if (sl == "belgium")              it.image(14, circuit_y, id(circuit_belgium));
        else if (sl == "hungary")              it.image(14, circuit_y, id(circuit_hungary));
        else if (sl == "netherlands")          it.image(14, circuit_y, id(circuit_netherlands));
        else if (sl == "italy")                it.image(14, circuit_y, id(circuit_italy));
        else if (sl == "spain")                it.image(14, circuit_y, id(circuit_spain));
        else if (sl == "azerbaijan")           it.image(14, circuit_y, id(circuit_azerbaijan));
        else if (sl == "singapore")            it.image(14, circuit_y, id(circuit_singapore));
        else if (sl == "united-states")        it.image(14, circuit_y, id(circuit_united_states));
        else if (sl == "mexico")               it.image(14, circuit_y, id(circuit_mexico));
        else if (sl == "brazil")               it.image(14, circuit_y, id(circuit_brazil));
        else if (sl == "las-vegas")            it.image(14, circuit_y, id(circuit_las_vegas));
        else if (sl == "qatar")                it.image(14, circuit_y, id(circuit_qatar));
        else if (sl == "united-arab-emirates") it.image(14, circuit_y, id(circuit_united_arab_emirates));
        else                                   it.image(14, circuit_y, id(circuit_japan));
      }

      // ── HÖGER: Senaste race / LIVE flagg+varv+RC (x:162-319, y:34-108) ──────

      bool live = id(cyd_live_mode).state == "1";

      if (live) {
        it.print(165, 37, id(font_xs), Color(239, 68, 68),  "LIVE");
        it.print(165, 51, id(font_xs), col(id(cyd_flag_color).state), id(cyd_flag).state.c_str());
        it.print(165, 66, id(font_xs), Color(255, 255, 255), id(cyd_lap).state.c_str());
        it.print(165, 80, id(font_xs), Color(100, 116, 139), id(cyd_rc_line1).state.c_str());
        it.print(165, 94, id(font_xs), Color(100, 116, 139), id(cyd_rc_line2).state.c_str());
      } else {
        it.print(165, 37, id(font_xs), Color(100, 116, 139), "SENASTE RACE");
        it.print(165, 51, id(font_xs), Color(255, 255, 255), id(cyd_last_race).state.c_str());
        it.print(165, 66, id(font_xs), Color(255, 215, 0),   "1");
        it.print(178, 66, id(font_xs), Color(255, 215, 0),   id(cyd_p1).state.c_str());
        it.print(165, 80, id(font_xs), Color(192, 192, 192), "2");
        it.print(178, 80, id(font_xs), Color(192, 192, 192), id(cyd_p2).state.c_str());
        it.print(165, 94, id(font_xs), Color(205, 127, 50),  "3");
        it.print(178, 94, id(font_xs), Color(205, 127, 50),  id(cyd_p3).state.c_str());
      }

      // ── HÖGER: Förarmästerskap / LIVE positioner (x:162-319, y:110-206) ─────

      if (live) {
        it.print(165, 113, id(font_xs), Color(239, 68, 68), "LIVE RACE");
      } else {
        it.print(165, 113, id(font_xs), Color(100, 116, 139), "FÖRARMÄSTERSKAPET");
      }

      it.print(165, 127, id(font_xs), Color(255, 215, 0),   "1");
      it.print(178, 127, id(font_xs), Color(255, 215, 0),   id(cyd_ms1).state.c_str());
      it.print(165, 141, id(font_xs), Color(192, 192, 192), "2");
      it.print(178, 141, id(font_xs), Color(192, 192, 192), id(cyd_ms2).state.c_str());
      it.print(165, 155, id(font_xs), Color(205, 127, 50),  "3");
      it.print(178, 155, id(font_xs), Color(205, 127, 50),  id(cyd_ms3).state.c_str());
      it.print(165, 169, id(font_xs), Color(255, 255, 255), "4");
      it.print(178, 169, id(font_xs), Color(255, 255, 255), id(cyd_ms4).state.c_str());
      it.print(165, 183, id(font_xs), Color(255, 255, 255), "5");
      it.print(178, 183, id(font_xs), Color(255, 255, 255), id(cyd_ms5).state.c_str());

      // ── FOOTER höger (y:208-240, x:162-319): Datum + Klocka ─────────────────

      if (now.is_valid()) {
        const char* dagar[]   = {"?","Sön","Mån","Tis","Ons","Tor","Fre","Lör"};
        const char* manader[] = {"","Jan","Feb","Mar","Apr","Maj","Jun","Jul","Aug","Sep","Okt","Nov","Dec"};
        char dbuf[22];
        snprintf(dbuf, sizeof(dbuf), "%s %d %s  %02d:%02d",
          dagar[now.day_of_week], now.day_of_month, manader[now.month],
          now.hour, now.minute);
        it.print(240, 220, id(font_xs), Color(255, 255, 255), TextAlign::TOP_CENTER, dbuf);
      }
