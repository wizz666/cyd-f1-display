esphome:
  name: cyd-countdown
  friendly_name: "CYD F1 Countdown"
  on_boot:
    priority: 600
    then:
      - output.turn_on: backlight_pin

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "CYD Fallback"
    password: !secret fallback_ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: WARN

# ── Tid (synkad med HA) ───────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time

# ── SPI ──────────────────────────────────────────────────────────────────────
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

# ── Bakgrundsljus ─────────────────────────────────────────────────────────────
output:
  - platform: gpio
    pin: GPIO21
    id: backlight_pin

# ── Bilder ───────────────────────────────────────────────────────────────────
image:
