esphome:
  name: cyd-countdown
  friendly_name: "CYD F1 Countdown"
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: backlight
          brightness: 70%

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "CYD Fallback"
    password: !secret fallback_ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: WARN

# ── Tid (synkad med HA) ───────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - hours: 23
        minutes: 0
        seconds: 0
        then:
          - light.turn_on:
              id: backlight
              brightness: 10%
      - hours: 7
        minutes: 0
        seconds: 0
        then:
          - light.turn_on:
              id: backlight
              brightness: 70%

# ── SPI ──────────────────────────────────────────────────────────────────────
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

# ── Bakgrundsljus (PWM via LEDC – motverkar inbränning) ───────────────────────
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pin
    frequency: 5000 Hz

  # RGB LED (active low) – sätt HIGH vid boot för att stänga av
  - platform: gpio
    pin: GPIO4
    id: rgb_r
    inverted: true
  - platform: gpio
    pin: GPIO16
    id: rgb_g
    inverted: true
  - platform: gpio
    pin: GPIO17
    id: rgb_b
    inverted: true

light:
  - platform: monochromatic
    output: backlight_pin
    id: backlight
    name: "CYD Bakgrundsljus"
    restore_mode: ALWAYS_ON
    default_transition_length: 2s

